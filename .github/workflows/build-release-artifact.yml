name: Build Release Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MWH.KeyPressCounter.csproj

      - name: Build
        run: dotnet build MWH.KeyPressCounter.csproj --configuration Release --no-restore

      - name: Publish win-x64
        run: dotnet publish MWH.KeyPressCounter.csproj --configuration Release --runtime win-x64 --self-contained false --no-build -o artifacts/win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyPressCounter-win-x64
          path: artifacts/win-x64
          if-no-files-found: error
